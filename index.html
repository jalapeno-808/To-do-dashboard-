<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --base: #F6F5F2;
    --card: #FFFFFF;
    --ink: #1B1D22;
    --muted: #8B8D97;
    --line: #E7E5E0;
    --accent: #1E5EFF;
    --accent-dim: #E8EDFF;
    --done: #17C964;
    --done-dim: #E7F9EE;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--base); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  body { min-height:100vh; display:flex; justify-content:center; padding:32px 16px 80px; }
  .app { width:100%; max-width:480px; }
  header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; padding:0 4px; }
  .wordmark { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:28px; letter-spacing:-0.02em; }
  .wordmark span { color:var(--accent); }
  .today-count { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted); text-align:right; }
  .today-count b { color:var(--ink); font-size:15px; font-weight:600; }
  .add-row { display:flex; gap:8px; margin-bottom:14px; }
  #add-input { flex:1; font-family:'Inter',sans-serif; font-size:16px; font-weight:500; padding:16px 18px; border:2px solid var(--ink); border-radius:14px; background:var(--card); color:var(--ink); outline:none; transition:border-color .15s ease; }
  #add-input::placeholder { color:var(--muted); font-weight:400; }
  #add-input:focus { border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-dim); }
  #add-btn { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:22px; width:54px; border:none; border-radius:14px; background:var(--accent); color:#fff; cursor:pointer; transition:transform .1s ease, background .15s ease; }
  #add-btn:hover { background:#164ADB; }
  #add-btn:active { transform:scale(.94); }
  #add-btn:focus-visible, #add-input:focus-visible { outline:3px solid var(--accent); outline-offset:2px; }
  .quick-label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 8px 4px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .chip { font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; padding:9px 14px; border-radius:999px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; transition:all .12s ease; }
  .chip:hover { border-color:var(--accent); background:var(--accent-dim); }
  .chip:active { transform:scale(.95); }
  .chip:focus-visible { outline:3px solid var(--accent); outline-offset:2px; }
  .pick-one-row { margin-bottom:24px; }
  #pick-one-btn { width:100%; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; padding:13px; border:2px dashed var(--line); border-radius:14px; background:transparent; color:var(--muted); cursor:pointer; transition:all .15s ease; }
  #pick-one-btn:hover { border-color:var(--ink); color:var(--ink); }
  #pick-one-btn:disabled { opacity:.4; cursor:default; }
  #pick-one-btn:focus-visible { outline:3px solid var(--accent); outline-offset:2px; }
  .section-label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 10px 4px; }
  ul.list { list-style:none; margin:0 0 24px; padding:0; display:flex; flex-direction:column; gap:8px; }
  li.item { display:flex; align-items:flex-start; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; animation:rise .2s ease; }
  @keyframes rise { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .check { flex-shrink:0; width:24px; height:24px; border-radius:50%; border:2px solid var(--ink); background:transparent; cursor:pointer; margin-top:1px; padding:0; display:flex; align-items:center; justify-content:center; transition:all .15s ease; }
  .check:hover { border-color:var(--done); background:var(--done-dim); }
  .check:focus-visible { outline:3px solid var(--accent); outline-offset:2px; }
  .item-text { flex:1; font-size:15.5px; font-weight:500; line-height:1.4; word-break:break-word; padding-top:1px; }
  .del { flex-shrink:0; border:none; background:none; color:var(--muted); font-size:18px; line-height:1; cursor:pointer; padding:2px 4px; opacity:0; transition:opacity .15s ease, color .15s ease; }
  li.item:hover .del, li.item:focus-within .del { opacity:1; }
  .del:hover { color:#E0483D; }
  .del:focus-visible { outline:2px solid var(--accent); opacity:1; }
  li.item.completing { animation:complete-fade .5s ease forwards; }
  @keyframes complete-fade { 0%{opacity:1;} 40%{opacity:.5; text-decoration:line-through;} 100%{opacity:0; transform:scale(.98) translateX(4px);} }
  .empty { text-align:center; padding:48px 20px; color:var(--muted); }
  .empty .big { font-family:'Space Grotesk',sans-serif; font-size:17px; color:var(--ink); margin-bottom:6px; font-weight:600; }
  .empty .small { font-size:14px; }
  .done-toggle { display:flex; align-items:center; gap:10px; background:none; border:none; cursor:pointer; padding:6px 4px; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.05em; text-transform:uppercase; width:100%; }
  .done-toggle:focus-visible { outline:3px solid var(--accent); outline-offset:2px; border-radius:6px; }
  .dots { display:flex; gap:4px; flex-wrap:wrap; flex:1; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--done); }
  .chevron { transition:transform .15s ease; flex-shrink:0; }
  .chevron.open { transform:rotate(180deg); }
  ul.done-list { list-style:none; margin:10px 0 0; padding:0; display:flex; flex-direction:column; gap:6px; }
  li.done-item { display:flex; align-items:center; gap:10px; padding:10px 14px; font-size:14px; color:var(--muted); text-decoration:line-through; background:var(--done-dim); border-radius:12px; }
  li.done-item .check { width:18px; height:18px; border-color:var(--done); background:var(--done); flex-shrink:0; }
  li.done-item .check::after { content:''; display:block; width:5px; height:8px; border-right:2px solid white; border-bottom:2px solid white; transform:rotate(45deg); margin:-2px 0 0 0; }
  .overlay { position:fixed; inset:0; background:rgba(27,29,34,.55); display:flex; align-items:center; justify-content:center; padding:24px; z-index:10; animation:overlay-in .15s ease; }
  @keyframes overlay-in { from{opacity:0;} to{opacity:1;} }
  .focus-card { background:var(--card); border-radius:20px; padding:36px 28px 28px; max-width:400px; width:100%; text-align:center; animation:focus-in .2s ease; }
  @keyframes focus-in { from{opacity:0; transform:scale(.96) translateY(8px);} to{opacity:1; transform:scale(1) translateY(0);} }
  .focus-label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
  .focus-text { font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:600; line-height:1.3; margin-bottom:28px; word-break:break-word; }
  .focus-actions { display:flex; gap:10px; }
  .focus-btn { flex:1; font-family:'Inter',sans-serif; font-weight:600; font-size:14px; padding:13px; border-radius:12px; cursor:pointer; border:none; transition:transform .1s ease, opacity .15s ease; }
  .focus-btn:active { transform:scale(.96); }
  .focus-btn:focus-visible { outline:3px solid var(--accent); outline-offset:2px; }
  .focus-btn.done { background:var(--done); color:#fff; }
  .focus-btn.skip { background:var(--base); color:var(--ink); border:1px solid var(--line); }
  .focus-btn.close { background:none; color:var(--muted); font-size:13px; padding:10px; margin-top:6px; }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="wordmark">do<span>:</span></div>
    <div class="today-count"><b id="done-today-num">0</b> done today</div>
  </header>

  <div class="add-row">
    <input id="add-input" type="text" placeholder="What's on your mind?" autocomplete="off" />
    <button id="add-btn" aria-label="Add item">+</button>
  </div>

  <div class="quick-label">Quick add</div>
  <div class="chips" id="chips">
    <button class="chip" data-text="Weight training">🏋️ Weight training</button>
    <button class="chip" data-text="Pilates">🧘 Pilates</button>
    <button class="chip" data-text="HYROX training">🔥 HYROX training</button>
    <button class="chip" data-text="Golf lesson">⛳ Golf lesson</button>
    <button class="chip" data-text="Peanut butter">🥜 Peanut butter</button>
    <button class="chip" data-text="Milk">🥛 Milk</button>
    <button class="chip" data-text="Eggs">🥚 Eggs</button>
    <button class="chip" data-text="Avocado">🥑 Avocado</button>
<button class="chip" data-text="Coconut water">🥥 Coconut water</button>

  </div>

  <div class="pick-one-row">
    <button id="pick-one-btn">Too much? Pick one for me →</button>
  </div>

  <div id="list-wrap"></div>
  <div id="done-wrap"></div>
</div>

<div id="focus-overlay" style="display:none;"></div>

<script>
  const STORAGE_KEY = 'items';
  let items = [];
  let doneExpanded = false;
  let loaded = false;

  const listWrap = document.getElementById('list-wrap');
  const doneWrap = document.getElementById('done-wrap');
  const addInput = document.getElementById('add-input');
  const addBtn = document.getElementById('add-btn');
  const pickOneBtn = document.getElementById('pick-one-btn');
  const doneTodayNum = document.getElementById('done-today-num');
  const focusOverlay = document.getElementById('focus-overlay');
  const chips = document.getElementById('chips');

  function todayStr() { return new Date().toDateString(); }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      items = raw ? JSON.parse(raw) : [];
    } catch (e) { items = []; }
    loaded = true;
    render();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
    catch (e) { console.error('Storage error', e); }
  }

  function addItem(text) {
    text = text.trim();
    if (!text) return;
    items.unshift({
      id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
      text, done:false, createdAt:new Date().toISOString(), completedAt:null
    });
    save(); render();
  }

  function completeItem(id, el) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const finish = () => { item.done=true; item.completedAt=new Date().toISOString(); save(); render(); };
    if (el) { el.classList.add('completing'); el.addEventListener('animationend', finish, {once:true}); }
    else finish();
  }

  function deleteItem(id) { items = items.filter(i => i.id !== id); save(); render(); }

  function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

  function render() {
    if (!loaded) return;
    const active = items.filter(i => !i.done);
    const doneAll = items.filter(i => i.done);
    const doneToday = doneAll.filter(i => i.completedAt && new Date(i.completedAt).toDateString() === todayStr());

    doneTodayNum.textContent = doneToday.length;
    pickOneBtn.disabled = active.length === 0;

    if (active.length === 0) {
      listWrap.innerHTML = `<div class="empty"><div class="big">Nothing on the list.</div><div class="small">Type something above and hit enter — that's it.</div></div>`;
    } else {
      listWrap.innerHTML = `<ul class="list">${active.map(i => `
        <li class="item" data-id="${i.id}">
          <button class="check" aria-label="Mark done"></button>
          <div class="item-text">${escapeHtml(i.text)}</div>
          <button class="del" aria-label="Delete">×</button>
        </li>`).join('')}</ul>`;
    }

    if (doneToday.length === 0) {
      doneWrap.innerHTML = '';
    } else {
      const dotCap = 20;
      const dots = doneToday.slice(0,dotCap).map(()=>`<span class="dot"></span>`).join('');
      const extra = doneToday.length > dotCap ? `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">+${doneToday.length-dotCap}</span>` : '';
      doneWrap.innerHTML = `
        <button class="done-toggle" id="done-toggle-btn">
          <div class="dots">${dots}${extra}</div>
          <span>Done today (${doneToday.length})</span>
          <svg class="chevron ${doneExpanded?'open':''}" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        ${doneExpanded ? `<ul class="done-list">${doneToday.map(i => `
          <li class="done-item" data-id="${i.id}">
            <span class="check"></span>
            <span style="flex:1;">${escapeHtml(i.text)}</span>
            <button class="del" aria-label="Delete" style="opacity:.6;">×</button>
          </li>`).join('')}</ul>` : ''}`;
      document.getElementById('done-toggle-btn').addEventListener('click', () => { doneExpanded=!doneExpanded; render(); });
    }

    listWrap.querySelectorAll('li.item').forEach(li => {
      const id = li.dataset.id;
      li.querySelector('.check').addEventListener('click', () => completeItem(id, li));
      li.querySelector('.del').addEventListener('click', () => deleteItem(id));
    });
    doneWrap.querySelectorAll('li.done-item').forEach(li => {
      const id = li.dataset.id;
      li.querySelector('.del').addEventListener('click', () => deleteItem(id));
    });
  }

  addBtn.addEventListener('click', () => { addItem(addInput.value); addInput.value=''; addInput.focus(); });
  addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { addItem(addInput.value); addInput.value=''; } });

  chips.addEventListener('click', (e) => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    addItem(btn.dataset.text);
  });

  pickOneBtn.addEventListener('click', () => {
    const active = items.filter(i => !i.done);
    if (active.length === 0) return;
    showFocus(active[Math.floor(Math.random()*active.length)]);
  });

  function showFocus(item) {
    focusOverlay.style.display = 'flex';
    focusOverlay.className = 'overlay';
    focusOverlay.innerHTML = `
      <div class="focus-card">
        <div class="focus-label">Just this one</div>
        <div class="focus-text">${escapeHtml(item.text)}</div>
        <div class="focus-actions">
          <button class="focus-btn done" id="focus-done">Done</button>
          <button class="focus-btn skip" id="focus-skip">Give me another</button>
        </div>
        <button class="focus-btn close" id="focus-close">Back to full list</button>
      </div>`;
    document.getElementById('focus-done').addEventListener('click', () => { completeItem(item.id); closeFocus(); });
    document.getElementById('focus-skip').addEventListener('click', () => {
      const active = items.filter(i => !i.done);
      if (active.length === 0) { closeFocus(); return; }
      showFocus(active[Math.floor(Math.random()*active.length)]);
    });
    document.getElementById('focus-close').addEventListener('click', closeFocus);
  }

  function closeFocus() { focusOverlay.style.display='none'; focusOverlay.innerHTML=''; }

  load();
</script>

</body>
</html>
