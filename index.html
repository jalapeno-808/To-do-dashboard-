<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --base: #FBF7FF;
    --card: #FFFFFF;
    --ink: #241B2F;
    --muted: #9C8FAE;
    --line: #ECE4F7;

    --pink: #FF1493;
    --pink-dim: #FFDCEE;
    --lime: #C9E600;
    --lime-dim: #F3FADB;
    --green: #0FA958;
    --green-dim: #DEF7E9;
    --teal: #00B39E;
    --teal-dim: #DEFBF6;
    --lav: #8B6FE8;
    --lav-dim: #ECE6FF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 28px 16px 72px;
    background: var(--pink);
  }

  .app { width: 100%; max-width: 460px; }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding: 0 2px;
  }

  .header-left { display:flex; align-items:center; gap:10px; }

  .wordmark {
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.03em;
    color: var(--pink);
    background: rgba(255,255,255,0.88);
    padding: 5px 12px;
    border-radius: 6px;
  }
  .wordmark span { color: var(--pink); }

  .cal-btn {
    width: 34px;
    height: 34px;
    border-radius: 5px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .12s ease;
  }
  .cal-btn:hover { border-color: var(--teal); background: var(--teal-dim); }
  .cal-btn:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  .today-count {
    font-size: 11.5px;
    font-weight: 600;
    color: rgba(36,27,47,0.65);
    text-align: right;
  }
  .today-count b {
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
  }

  /* ---- Quick add ---- */
  .add-row { display: flex; gap: 7px; margin-bottom: 12px; }

  #add-input {
    flex: 1;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 11px;
    border: 1.5px solid var(--ink);
    border-radius: 5px;
    background: var(--card);
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease;
  }
  #add-input::placeholder { color: var(--muted); font-weight: 400; }
  #add-input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--pink-dim); }

  #add-btn {
    font-weight: 700;
    font-size: 16px;
    width: 34px;
    border: none;
    border-radius: 5px;
    background: var(--pink);
    color: #fff;
    cursor: pointer;
    transition: transform .1s ease, background .15s ease;
  }
  #add-btn:hover { background: #E0158A; }
  #add-btn:active { transform: scale(.94); }
  #add-btn:focus-visible, #add-input:focus-visible { outline: 3px solid var(--pink); outline-offset: 2px; }

  .quick-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: rgba(36,27,47,0.7);
    margin: 0 0 7px 3px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

  .chip {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 8px;
    border-radius: 5px;
    border: 1.5px solid var(--lav);
    background: var(--lav-dim);
    color: var(--ink);
    cursor: pointer;
    transition: all .12s ease;
  }
  .chip:hover { border-color: var(--teal); background: var(--teal-dim); }
  .chip:active { transform: scale(.95); }
  .chip:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  .pick-one-row { margin-bottom: 20px; }

  #pick-one-btn {
    width: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 8px;
    border: 1.5px dashed var(--teal);
    border-radius: 5px;
    background: rgba(255,255,255,0.5);
    color: var(--ink);
    cursor: pointer;
    transition: all .15s ease;
  }
  #pick-one-btn:hover { background: var(--teal-dim); }
  #pick-one-btn:disabled { opacity: .4; cursor: default; }
  #pick-one-btn:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  /* ---- List ---- */
  ul.list {
    list-style: none;
    margin: 0 0 20px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  li.item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 5px;
    padding: 10px 11px;
    animation: rise .2s ease;
  }
  @keyframes rise { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .check {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid var(--ink);
    background: transparent;
    cursor: pointer;
    margin-top: 1px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s ease;
  }
  .check:hover { border-color: var(--green); background: var(--green-dim); }
  .check:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  .item-text {
    flex: 1;
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
    padding-top: 1px;
  }

  .del {
    flex-shrink: 0;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 3px;
    opacity: 0;
    transition: opacity .15s ease, color .15s ease;
  }
  li.item:hover .del, li.item:focus-within .del { opacity: 1; }
  .del:hover { color: var(--pink); }
  .del:focus-visible { outline: 2px solid var(--teal); opacity: 1; }

  li.item.completing { animation: complete-fade .5s ease forwards; }
  @keyframes complete-fade {
    0% { opacity: 1; }
    40% { opacity: .5; text-decoration: line-through; }
    100% { opacity: 0; transform: scale(.98) translateX(4px); }
  }

  .empty { text-align: center; padding: 44px 20px; color: var(--muted); }
  .empty .big { font-size: 15.5px; color: var(--ink); margin-bottom: 5px; font-weight: 700; }
  .empty .small { font-size: 13px; font-weight: 400; }

  /* ---- Done today (collapsed) ---- */
  .done-toggle {
    display: flex;
    align-items: center;
    gap: 9px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 3px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    width: 100%;
  }
  .done-toggle:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

  .dots { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .dot { width: 7px; height: 7px; border-radius: 2px; background: var(--green); }

  .chevron { transition: transform .15s ease; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  ul.done-list {
    list-style: none;
    margin: 8px 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  li.done-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 12px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: line-through;
    background: var(--green-dim);
    border-radius: 5px;
  }

  li.done-item .check {
    width: 16px;
    height: 16px;
    border-radius: 5px;
    border-color: var(--lime);
    background: var(--lime);
    flex-shrink: 0;
  }
  li.done-item .check::after {
    content: '';
    display: block;
    width: 4px;
    height: 7px;
    border-right: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    transform: rotate(45deg);
    margin: -2px 0 0 0;
  }

  /* ---- Overlays (shared) ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(36, 27, 47, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
    z-index: 10;
    animation: overlay-in .15s ease;
  }
  @keyframes overlay-in { from{opacity:0;} to{opacity:1;} }

  /* ---- Focus (Pick One) ---- */
  .focus-card {
    background: var(--card);
    border-radius: 8px;
    padding: 30px 24px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    animation: focus-in .2s ease;
  }
  @keyframes focus-in { from{opacity:0; transform:scale(.96) translateY(8px);} to{opacity:1; transform:scale(1) translateY(0);} }

  .focus-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 14px;
  }

  .focus-text {
    font-size: 21px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 22px;
    word-break: break-word;
  }

  .focus-actions { display: flex; gap: 8px; }

  .focus-btn {
    flex: 1;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 11px;
    border-radius: 5px;
    cursor: pointer;
    border: none;
    transition: transform .1s ease, opacity .15s ease;
  }
  .focus-btn:active { transform: scale(.96); }
  .focus-btn:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  .focus-btn.done { background: var(--green); color: #fff; }
  .focus-btn.skip { background: var(--lav-dim); color: var(--ink); border: 1.5px solid var(--lav); }
  .focus-btn.close { background: none; color: var(--muted); font-size: 12px; padding: 9px; margin-top: 4px; font-weight: 600; }

  /* ---- Calendar / History overlay ---- */
  .cal-card {
    background: var(--card);
    border-radius: 8px;
    padding: 20px 18px 22px;
    max-width: 400px;
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    animation: focus-in .2s ease;
  }

  .cal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-title { font-size: 16px; font-weight: 700; }

  .cal-nav { display: flex; gap: 6px; }

  .cal-nav-btn {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1.5px solid var(--line);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    font-weight: 700;
  }
  .cal-nav-btn:hover { border-color: var(--teal); background: var(--teal-dim); }
  .cal-nav-btn:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 16px;
  }

  .cal-dow {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-align: center;
    padding-bottom: 4px;
    text-transform: uppercase;
  }

  .cal-day {
    position: relative;
    aspect-ratio: 1;
    border-radius: 5px;
    border: 1.5px solid var(--line);
    background: var(--card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    transition: all .12s ease;
  }
  .cal-day.blank { visibility: hidden; cursor: default; }
  .cal-day:hover { border-color: var(--lav); background: var(--lav-dim); }
  .cal-day.today { border-color: var(--pink); border-width: 2px; }
  .cal-day.selected { background: var(--teal); border-color: var(--teal); color: var(--ink); }
  .cal-day .cdot { width: 4px; height: 4px; border-radius: 1px; background: var(--green); position: absolute; bottom: 4px; }
  .cal-day.selected .cdot { background: var(--ink); }

  .cal-detail-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  ul.cal-list { list-style: none; margin: 0 0 14px; padding: 0; display: flex; flex-direction: column; gap: 6px; }

  li.cal-list-item {
    font-size: 13.5px;
    font-weight: 500;
    padding: 9px 11px;
    background: var(--green-dim);
    border-radius: 5px;
    color: var(--ink);
  }

  .cal-empty { font-size: 13px; color: var(--muted); padding: 8px 2px 14px; }

  .cal-close {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: none;
    background: var(--base);
    color: var(--muted);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .cal-close:hover { color: var(--ink); }
  .cal-close:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-left">
      <div class="wordmark">splash<span>:</span></div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="today-count"><b id="done-today-num">0</b> done today</div>
      <button class="cal-btn" id="open-cal-btn" aria-label="View history">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="2"/>
          <path d="M3 9.5H21" stroke="currentColor" stroke-width="2"/>
          <path d="M8 3V6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 3V6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="add-row">
    <input id="add-input" type="text" placeholder="What's on your mind?" autocomplete="off" />
    <button id="add-btn" aria-label="Add item">+</button>
  </div>

  <div class="quick-label">Quick add</div>
  <div class="chips" id="chips">
    <button class="chip" data-text="Weight training">🏋️ Weight training</button>
    <button class="chip" data-text="Pilates">🧘 Pilates</button>
    <button class="chip" data-text="HYROX training">🔥 HYROX training</button>
    <button class="chip" data-text="Golf lesson">⛳ Golf lesson</button>
    <button class="chip" data-text="Peanut butter">🥜 Peanut butter</button>
    <button class="chip" data-text="Banana">🍌 Banana</button>
    <button class="chip" data-text="Eggs">🥚 Eggs</button>
    <button class="chip" data-text="Avocado">🥑 Avocado</button>
    <button class="chip" data-text="Coconut water">🥥 Coconut water</button>
  </div>

  <div class="pick-one-row">
    <button id="pick-one-btn">Too much? Pick one for me →</button>
  </div>

  <div id="list-wrap"></div>
  <div id="done-wrap"></div>
</div>

<div id="focus-overlay" style="display:none;"></div>
<div id="cal-overlay" style="display:none;"></div>

<script>
  const STORAGE_KEY = 'items';
  let items = [];
  let doneExpanded = false;
  let loaded = false;

  // calendar state
  let calMonth = new Date(); calMonth.setDate(1);
  let calSelectedDate = null; // 'toDateString' value

  const listWrap = document.getElementById('list-wrap');
  const doneWrap = document.getElementById('done-wrap');
  const addInput = document.getElementById('add-input');
  const addBtn = document.getElementById('add-btn');
  const pickOneBtn = document.getElementById('pick-one-btn');
  const doneTodayNum = document.getElementById('done-today-num');
  const focusOverlay = document.getElementById('focus-overlay');
  const calOverlay = document.getElementById('cal-overlay');
  const chips = document.getElementById('chips');
  const openCalBtn = document.getElementById('open-cal-btn');

  function todayStr() { return new Date().toDateString(); }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      items = raw ? JSON.parse(raw) : [];
    } catch (e) { items = []; }
    loaded = true;
    render();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
    catch (e) { console.error('Storage error', e); }
  }

  function addItem(text) {
    text = text.trim();
    if (!text) return;
    items.unshift({
      id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
      text, done:false, createdAt:new Date().toISOString(), completedAt:null
    });
    save(); render();
  }

  function completeItem(id, el) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const finish = () => { item.done=true; item.completedAt=new Date().toISOString(); save(); render(); };
    if (el) { el.classList.add('completing'); el.addEventListener('animationend', finish, {once:true}); }
    else finish();
  }

  function deleteItem(id) { items = items.filter(i => i.id !== id); save(); render(); }

  function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

  function render() {
    if (!loaded) return;
    const active = items.filter(i => !i.done);
    const doneAll = items.filter(i => i.done);
    const doneToday = doneAll.filter(i => i.completedAt && new Date(i.completedAt).toDateString() === todayStr());

    doneTodayNum.textContent = doneToday.length;
    pickOneBtn.disabled = active.length === 0;

    if (active.length === 0) {
      listWrap.innerHTML = `<div class="empty"><div class="big">Nothing on the list.</div><div class="small">Type something above and hit enter — that's it.</div></div>`;
    } else {
      listWrap.innerHTML = `<ul class="list">${active.map(i => `
        <li class="item" data-id="${i.id}">
          <button class="check" aria-label="Mark done"></button>
          <div class="item-text">${escapeHtml(i.text)}</div>
          <button class="del" aria-label="Delete">×</button>
        </li>`).join('')}</ul>`;
    }

    if (doneToday.length === 0) {
      doneWrap.innerHTML = '';
    } else {
      const dotCap = 24;
      const dots = doneToday.slice(0,dotCap).map(()=>`<span class="dot"></span>`).join('');
      const extra = doneToday.length > dotCap ? `<span style="font-size:10px;font-weight:600;color:var(--muted);">+${doneToday.length-dotCap}</span>` : '';
      doneWrap.innerHTML = `
        <button class="done-toggle" id="done-toggle-btn">
          <div class="dots">${dots}${extra}</div>
          <span>Done today (${doneToday.length})</span>
          <svg class="chevron ${doneExpanded?'open':''}" width="11" height="11" viewBox="0 0 12 12" fill="none">
            <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        ${doneExpanded ? `<ul class="done-list">${doneToday.map(i => `
          <li class="done-item" data-id="${i.id}">
            <span class="check"></span>
            <span style="flex:1;">${escapeHtml(i.text)}</span>
            <button class="del" aria-label="Delete" style="opacity:.6;">×</button>
          </li>`).join('')}</ul>` : ''}`;
      document.getElementById('done-toggle-btn').addEventListener('click', () => { doneExpanded=!doneExpanded; render(); });
    }

    listWrap.querySelectorAll('li.item').forEach(li => {
      const id = li.dataset.id;
      li.querySelector('.check').addEventListener('click', () => completeItem(id, li));
      li.querySelector('.del').addEventListener('click', () => deleteItem(id));
    });
    doneWrap.querySelectorAll('li.done-item').forEach(li => {
      const id = li.dataset.id;
      li.querySelector('.del').addEventListener('click', () => deleteItem(id));
    });
  }

  addBtn.addEventListener('click', () => { addItem(addInput.value); addInput.value=''; addInput.focus(); });
  addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { addItem(addInput.value); addInput.value=''; } });

  chips.addEventListener('click', (e) => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    addItem(btn.dataset.text);
  });

  pickOneBtn.addEventListener('click', () => {
    const active = items.filter(i => !i.done);
    if (active.length === 0) return;
    showFocus(active[Math.floor(Math.random()*active.length)]);
  });

  function showFocus(item) {
    focusOverlay.style.display = 'flex';
    focusOverlay.className = 'overlay';
    focusOverlay.innerHTML = `
      <div class="focus-card">
        <div class="focus-label">Just this one</div>
        <div class="focus-text">${escapeHtml(item.text)}</div>
        <div class="focus-actions">
          <button class="focus-btn done" id="focus-done">Done</button>
          <button class="focus-btn skip" id="focus-skip">Give me another</button>
        </div>
        <button class="focus-btn close" id="focus-close">Back to full list</button>
      </div>`;
    document.getElementById('focus-done').addEventListener('click', () => { completeItem(item.id); closeFocus(); });
    document.getElementById('focus-skip').addEventListener('click', () => {
      const active = items.filter(i => !i.done);
      if (active.length === 0) { closeFocus(); return; }
      showFocus(active[Math.floor(Math.random()*active.length)]);
    });
    document.getElementById('focus-close').addEventListener('click', closeFocus);
  }

  function closeFocus() { focusOverlay.style.display='none'; focusOverlay.innerHTML=''; }

  /* ---------------- Calendar / History ---------------- */

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW = ['S','M','T','W','T','F','S'];

  function countsByDate() {
    const map = {};
    items.filter(i => i.done && i.completedAt).forEach(i => {
      const key = new Date(i.completedAt).toDateString();
      map[key] = (map[key] || 0) + 1;
    });
    return map;
  }

  function openCalendar() {
    calMonth = new Date(); calMonth.setDate(1);
    calSelectedDate = todayStr();
    calOverlay.style.display = 'flex';
    renderCalendar();
  }

  function closeCalendar() {
    calOverlay.style.display = 'none';
    calOverlay.innerHTML = '';
  }

  function renderCalendar() {
    const year = calMonth.getFullYear();
    const month = calMonth.getMonth();
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const counts = countsByDate();
    const today = todayStr();

    let cells = '';
    for (let b = 0; b < firstDow; b++) cells += `<div class="cal-day blank"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(year, month, d);
      const dateKey = dateObj.toDateString();
      const cnt = counts[dateKey] || 0;
      const isToday = dateKey === today;
      const isSelected = dateKey === calSelectedDate;
      cells += `<button class="cal-day ${isToday?'today':''} ${isSelected?'selected':''}" data-date="${dateKey}">
        ${d}${cnt > 0 ? '<span class="cdot"></span>' : ''}
      </button>`;
    }

    let detailHtml = '';
    if (calSelectedDate) {
      const dayItems = items.filter(i => i.done && i.completedAt && new Date(i.completedAt).toDateString() === calSelectedDate);
      detailHtml = `<div class="cal-detail-label">${calSelectedDate === today ? 'Today' : calSelectedDate} · ${dayItems.length} done</div>`;
      if (dayItems.length === 0) {
        detailHtml += `<div class="cal-empty">Nothing completed this day.</div>`;
      } else {
        detailHtml += `<ul class="cal-list">${dayItems.map(i => `<li class="cal-list-item">${escapeHtml(i.text)}</li>`).join('')}</ul>`;
      }
    }

    calOverlay.className = 'overlay';
    calOverlay.innerHTML = `
      <div class="cal-card">
        <div class="cal-head">
          <div class="cal-title">${MONTH_NAMES[month]} ${year}</div>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="cal-prev" aria-label="Previous month">‹</button>
            <button class="cal-nav-btn" id="cal-next" aria-label="Next month">›</button>
          </div>
        </div>
        <div class="cal-grid">
          ${DOW.map(d => `<div class="cal-dow">${d}</div>`).join('')}
          ${cells}
        </div>
        ${detailHtml}
        <button class="cal-close" id="cal-close-btn">Close</button>
      </div>
    `;

    document.getElementById('cal-prev').addEventListener('click', () => {
      calMonth.setMonth(calMonth.getMonth() - 1);
      renderCalendar();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      calMonth.setMonth(calMonth.getMonth() + 1);
      renderCalendar();
    });
    document.getElementById('cal-close-btn').addEventListener('click', closeCalendar);
    calOverlay.querySelectorAll('.cal-day:not(.blank)').forEach(btn => {
      btn.addEventListener('click', () => {
        calSelectedDate = btn.dataset.date;
        renderCalendar();
      });
    });
  }

  openCalBtn.addEventListener('click', openCalendar);

  load();
</script>

</body>
</html>
